name: Deploy to mallah.asaz.cloud

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: 5.189.181.254
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/mallah-site/html
            git pull origin main
            echo "Deployed at $(date)"
